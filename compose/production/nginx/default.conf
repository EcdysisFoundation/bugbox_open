upstream bugbox3 {
    server django:8000;
}

server {

    listen 80;
    client_max_body_size 100M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location / {
        proxy_pass http://bugbox3;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

}
